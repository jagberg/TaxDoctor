# This file is a template, and might need editing before it works on your project.
# The following script will work for any project that can be built from command line by msbuild
# It uses powershell shell executor, so you need to add the following line to your config.toml file
# (located in gitlab-runner.exe directory):
#   shell = "powershell"
#
# The script is composed of 3 stages: build, test and deploy.  
#
# The build stage restores NuGet packages and uses msbuild to build the exe
#
# The test stage runs nunit from command line against Test project inside your solution
# It also saves the resulting TestResult.xml file
#
# The deploy stage copies the exe from build stage to a network drive
# You need to have the network drive mapped as Local System user for gitlab-runner service to see it
# The best way to persist the mapping is via a scheduled task (see: https://stackoverflow.com/a/7867064/1288473),
# running the following batch command: net use P: \\x.x.x.x\Projects /u:your_user your_pass /persistent:yes


# place project specific paths in variables to make the rest of the script more generic
variables:
  DEPLOY_FOLDER: '.\deploy'
  NUGET_PATH: 'C:\Programs\Nuget\nuget.exe'
  MSBUILD_PATH: 'C:\Program Files (x86)\Microsoft Visual Studio\2017\Professional\MSBuild\15.0\Bin\MSBuild.exe'

stages:
  - build

build_job:
  stage: build
  only: # https://docs.gitlab.com/ee/ci/yaml/README.html
    - branches
    - web
    - pushes
  script:
    - '& "$env:NUGET_PATH" restore src\TaxDoctor.Web.sln' # restore Nuget dependencies
    - '& "$env:MSBUILD_PATH" src\TaxDoctor.Web\TaxDoctor.Web.csproj /p:Configuration=Release' # build the project
  artifacts:
    expire_in: 1 week # save gitlab server space, we copy the files we need to deploy folder later on
    paths:
      - '.\src\TaxDoctor.Web\bin\Release\'
      - '.\src\TaxDoctor.Web\web.config'
      - '.\BingSiteAuth.xml'
      - '.\googleb952dd2bdfaa9bb6.html'
      - '.\sitemapspal.xml'

